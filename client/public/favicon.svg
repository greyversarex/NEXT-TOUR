<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1e3a"/>
      <stop offset="100%" stop-color="#162f54"/>
    </linearGradient>
    <linearGradient id="goldN" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe08a"/>
      <stop offset="50%" stop-color="#f0a820"/>
      <stop offset="100%" stop-color="#c87e0a"/>
    </linearGradient>
    <linearGradient id="goldS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a2c06"/>
      <stop offset="100%" stop-color="#2a1804"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd97d"/>
      <stop offset="100%" stop-color="#c87e0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <circle cx="32" cy="32" r="25" fill="none" stroke="url(#ring)" stroke-width="1.2" opacity="0.5"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="url(#ring)" stroke-width="0.5" opacity="0.25"/>

  <line x1="32" y1="7.5" x2="32" y2="13" stroke="#ffd97d" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="32" y1="51" x2="32" y2="56.5" stroke="#ffd97d" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="7.5" y1="32" x2="13" y2="32" stroke="#ffd97d" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
  <line x1="51" y1="32" x2="56.5" y2="32" stroke="#ffd97d" stroke-width="1" stroke-linecap="round" opacity="0.3"/>

  <line x1="23.3" y1="9.8" x2="25.5" y2="14.2" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="40.7" y1="9.8" x2="38.5" y2="14.2" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="9.8" y1="23.3" x2="14.2" y2="25.5" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="9.8" y1="40.7" x2="14.2" y2="38.5" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="54.2" y1="23.3" x2="49.8" y2="25.5" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="54.2" y1="40.7" x2="49.8" y2="38.5" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="23.3" y1="54.2" x2="25.5" y2="49.8" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>
  <line x1="40.7" y1="54.2" x2="38.5" y2="49.8" stroke="#ffd97d" stroke-width="0.6" stroke-linecap="round" opacity="0.2"/>

  <g filter="url(#glow)">
    <polygon points="32,9 36,30 32,28 28,30" fill="url(#goldN)"/>
    <polygon points="32,55 36,34 32,36 28,34" fill="url(#goldS)"/>
    <polygon points="9,32 30,28 28,32 30,36" fill="url(#goldS)"/>
    <polygon points="55,32 34,28 36,32 34,36" fill="url(#goldS)"/>
  </g>

  <circle cx="32" cy="32" r="4.5" fill="url(#bg)" stroke="url(#goldN)" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="2" fill="url(#goldN)"/>

  <text x="32" y="10.5" text-anchor="middle" font-family="Georgia, serif" font-size="5.5" font-weight="bold" fill="#ffe08a" opacity="0.95" letter-spacing="0">N</text>
</svg>
